<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport-fit=cover → ocupa toda a tela incluindo safe areas (notch/home bar)
      maximum-scale=1, user-scalable=no → bloqueia zoom por pinça e double-tap
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>Webi Match</title>
    <meta name="description" content="Trova il tuo gadget perfetto con Webidoo!" />
    <meta name="author" content="Webidoo" />

    <!-- iOS / iPadOS Web App (fullscreen quando aggiunto alla home) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Webi Match" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Webi Match" />
    <meta property="og:description" content="Trova il tuo gadget perfetto con Webidoo!" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
