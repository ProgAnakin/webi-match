<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport-fit=cover → ocupa toda a tela incluindo safe areas (notch/home bar)
      maximum-scale=1, user-scalable=no → bloqueia zoom por pinça e double-tap
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />

    <title>Webi Match</title>
    <meta name="description" content="Trova il tuo gadget perfetto!" />
    <meta name="author" content="Costanzo Annichini" />

    <!-- Theme color for Android Chrome PWA chrome bar -->
    <meta name="theme-color" content="#0d1117" />

    <!-- iOS / iPadOS Web App (fullscreen quando aggiunto alla home) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Webi Match" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS splash screens — iPad Pro 12.9" (3rd/4th/5th/6th gen) -->
    <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-2048x2732.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" href="/splash/splash-2732x2048.png" />
    <!-- iPad Pro 11" / iPad Air 4th/5th gen -->
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-1668x2388.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" href="/splash/splash-2388x1668.png" />
    <!-- iPad 10th gen / iPad Air 3rd gen -->
    <link rel="apple-touch-startup-image" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-1640x2360.png" />
    <!-- iPad mini 6th gen -->
    <link rel="apple-touch-startup-image" media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-1488x2266.png" />
    <!-- Generic fallback -->
    <link rel="apple-touch-startup-image" href="/splash/splash-1536x2048.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Open Graph / Social preview -->
    <meta property="og:title" content="Webi Match — Trova il tuo gadget perfetto" />
    <meta property="og:description" content="Swipe through 8 questions and get a personalised gadget recommendation with a discount code — an iPad kiosk PWA built for Webidoo Store." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webi-match.vercel.app" />
    <meta property="og:image" content="https://webi-match.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:locale" content="it_IT" />
    <meta property="og:locale:alternate" content="en_GB" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Webi Match — iPad kiosk PWA" />
    <meta name="twitter:description" content="Swipe quiz → instant product match → multilingual email. Built solo on React + Supabase." />
    <meta name="twitter:image" content="https://webi-match.vercel.app/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
