<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="flame-grad" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="chevron-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF2200"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background for favicon visibility -->
  <rect width="100" height="100" rx="20" fill="#1a1a2e"/>

  <!-- Heart outline — white, no fill -->
  <path d="M50 82 C50 82 16 60 16 38 C16 26 25 17 36 17 C42 17 48 21 50 26 C52 21 58 17 64 17 C75 17 84 26 84 38 C84 60 50 82 50 82Z"
        fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>

  <!-- Flame above heart -->
  <path d="M50 4 C49 9 44 14 46 20 C43 16 43 23 50 25 C57 23 57 16 54 20 C56 14 51 9 50 4Z"
        fill="url(#flame-grad)"/>

  <!-- Downward-pointing chevron / Webidoo mark inside heart -->
  <path d="M36 42 L50 59 L64 42 Z"
        fill="url(#chevron-grad)" rx="2"/>
</svg>
