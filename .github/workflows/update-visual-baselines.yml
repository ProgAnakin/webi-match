name: Update Visual Baselines

# Manual-only. Run this once after first adding visual-regression.spec.ts, and
# again whenever you intentionally change a screen that the suite captures.
# The workflow regenerates the PNG baselines IN CI (the only environment whose
# pixels match the gating CI run) and opens a PR with the updated images so
# the visual change can be reviewed before it locks in.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so we can branch from main and push back.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright WebKit
        run: npx playwright install --with-deps webkit

      - name: Regenerate visual baselines
        # BOOTSTRAP_VISUAL_BASELINES bypasses the in-spec skip guard that
        # protects regular CI runs when no baselines exist yet — without it,
        # the very first invocation would skip every test and write nothing.
        # --update-snapshots then captures (or overwrites) the PNG baselines.
        env:
          BOOTSTRAP_VISUAL_BASELINES: "1"
        run: |
          npx playwright test e2e/visual-regression.spec.ts \
            --update-snapshots \
            --reporter=list

      - name: Open PR if baselines changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tolerate a missing snapshots directory: if no baselines were
          # produced (suite skipped, all routes crashed before screenshotting),
          # we just exit cleanly rather than failing the workflow.
          if [ ! -d e2e/visual-regression.spec.ts-snapshots ]; then
            echo "No snapshots directory was created — nothing to commit."
            exit 0
          fi
          git add e2e/visual-regression.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes — nothing to commit."
            exit 0
          fi
          BRANCH="chore/update-visual-baselines-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore(e2e): update visual regression baselines"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(e2e): update visual regression baselines" \
            --body "Auto-generated baseline update from the **Update Visual Baselines** workflow. Review the screenshot diffs in the Files tab before merging — each PNG IS the new expected state, so anything visually wrong here will lock in as the new truth."
