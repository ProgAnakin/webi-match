name: CI

on:
  push:
    branches: [main, "claude/*", "feat/*", "fix/*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          # Provide stub env vars so Vite doesn't throw at build time.
          # Real secrets are only set in Vercel / Supabase — never here.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Required check — a red Playwright run blocks the PR. The earlier failures
    # were a wrong browser install (chromium instead of the iPad project's
    # WebKit), now fixed; the suite is green (8/8).

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # The only Playwright project is "ipad-landscape" (iPad Pro 11), which
        # runs on WebKit — the engine real iPad kiosks use. Installing chromium
        # here (as it was) meant the suite could never launch its browser in CI.
        run: npx playwright install --with-deps webkit

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
